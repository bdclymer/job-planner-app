services:
  - type: web
    name: job-planner-website
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JOB_PLANNER_API
        value: https://job-planner-api.onrender.com/api
      - key: CORS_ORIGIN
        value: https://job-planner-website.onrender.com
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1